# Basic Electric Production Estimate — Panel/Inverter Presets
#
# Five efficiency tiers, each pointing to a real SAM-database module and
# a Fronius 5 kW inverter.  Edit module_name / inverter_name to swap
# components without touching any Python code.
#
# modules_per_string must keep string Voc < inverter Vdcmax (480 V here).
# dc_ac_ratio: DC peak power / inverter AC rating (typical 1.1–1.3).
# system_loss_pct: total real-world system losses applied after ModelChain.
#   Accounts for soiling, DC/AC wiring, mismatch, degradation, availability.
#   16 % reflects typical Turkish residential installation losses.
# temperature_model + temperature_config: pvlib SAPM cell-temperature lookup.
#   close_mount_glass_glass matches flush roof-mount PV installations.

presets:

  very_low:
    label_en: "Very Low (14%)"
    label_tr: "Çok Düşük (14%)"
    description_en: "Budget polycrystalline silicon panels"
    description_tr: "Uygun fiyatlı polikristal silikon paneller"
    efficiency_pct: 14.22
    module_db: CECMod
    module_name: Shangpin_Solar_SPSM_275D
    module_stc_w: 275.0
    module_length_m: 1.954
    module_width_m: 0.990
    # 10 × Voc 43.8 V = 438 V  ✓ (< 480 V Vdcmax)
    modules_per_string: 10
    inverter_db: CECInverter
    inverter_name: "Fronius_USA__IG_Plus_5_0_1_UNI__240V_"
    inverter_paco_w: 5000
    dc_ac_ratio: 1.25
    system_loss_pct: 16.0
    temperature_model: sapm
    temperature_config: close_mount_glass_glass

